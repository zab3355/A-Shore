name: CI and Deploy

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-frontend:
    name: Validate frontend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        env:
          NODE_OPTIONS: --openssl-legacy-provider
        run: npm run build

      - name: Lint frontend
        run: npm run lint

  publish:
    name: Publish Docker images
    runs-on: ubuntu-latest
    needs:
      - validate-frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push UI
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          file: src/Dockerfile.ui
          push: true
          tags: |
            ghcr.io/zab3355/a-shore-ui:latest
            ghcr.io/zab3355/a-shore-ui:sha-${{ github.sha }}

      - name: Build and push server
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          file: server/Dockerfile.server
          push: true
          tags: |
            ghcr.io/zab3355/a-shore-server:latest
            ghcr.io/zab3355/a-shore-server:sha-${{ github.sha }}